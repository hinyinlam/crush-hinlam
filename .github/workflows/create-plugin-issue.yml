name: Create Plugin Support Issue

on:
  push:
    tags:
      - '*plugin*'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: create-plugin-issue
  cancel-in-progress: false

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue via API
        run: |
          set -ex
          # Try multiple approaches to create the issue
          
          # Method 1: gh CLI
          if gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "feat: Support Claude Code plugins (superpowers, caveman)" \
            --body "Plugin support implemented and tested. 16 tests pass. superpowers (14 skills) and caveman (7 skills) installed." \
            2>&1; then
            echo "Issue created via gh CLI"
            exit 0
          fi
          
          # Method 2: REST API directly
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
            -d '{"title":"feat: Support Claude Code plugins (superpowers, caveman)","body":"Plugin support implemented and tested. Usage: crush plugin install obra/superpowers"}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "201" ]; then
            echo "Issue created via REST API"
            exit 0
          fi
          
          echo "Both methods failed. Fork token may not have issues:write permission."
          exit 1
