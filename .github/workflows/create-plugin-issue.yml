name: Create Plugin Support Issue

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "feat: Support Claude Code plugins (superpowers, caveman)" \
            --body "Plugin support implemented and tested. Usage: crush plugin install obra/superpowers" \
            --label "enhancement"
