name: Create Plugin Support Issue

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/create-plugin-issue.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if issue already exists
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --search "Claude Code plugins" --state all --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue already exists: #$EXISTING"
            exit 0
          fi
          
          # Try to create the issue
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "feat: Support Claude Code plugins (superpowers, caveman)" \
            --body "Plugin support implemented. See commits 01156370 and 36e5e8ad." \
            --label "enhancement" || {
              echo "Failed to create issue with gh CLI"
              echo "Trying API directly..."
              
              # Try REST API directly
              curl -s -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
                -d '{"title":"feat: Support Claude Code plugins (superpowers, caveman)","body":"Plugin support implemented."}' \
                || echo "API call also failed"
            }
